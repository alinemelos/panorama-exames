services:
  db:
    image: imresamu/postgis:17-3.5 #MacOs 
    #image: postgis/postgis:17-3.5 #Linux
    env_file: ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      retries: 5

  migrate:
    build: ./backend
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py migrate
    restart: on-failure

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/docs/')\""]
      interval: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
